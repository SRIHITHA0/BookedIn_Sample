<div class="min-h-screen bg-obsidian flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-surface-100 border border-surface-300 rounded-2xl p-10 shadow-crimson">
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 class="text-crimson text-4xl font-extrabold tracking-tight mb-2">BookedIn</h1>
        <p class="text-gray-500 text-sm">Welcome back, reader.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-5" novalidate>

        <!-- Username -->
        <div>
          <label class="block text-gray-400 text-[10px] uppercase tracking-widest mb-1.5">Username</label>
          <input type="text" formControlName="username" placeholder="@yourhandle" class="bkin-input" />
          <span *ngIf="f['username'].invalid && f['username'].touched" class="bkin-error">
            Username is required.
          </span>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-gray-400 text-[10px] uppercase tracking-widest mb-1.5">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="Your password" class="bkin-input pr-10" />
            <button type="button" (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-crimson transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path *ngIf="!showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                <path *ngIf="showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <span *ngIf="f['password'].invalid && f['password'].touched" class="bkin-error">
            Password is required.
          </span>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage" class="bg-crimson/10 border border-crimson/30 rounded-lg px-4 py-3">
          <p class="text-crimson text-sm">{{ errorMessage }}</p>
        </div>

        <button type="submit" [disabled]="isLoading" class="bkin-btn-primary">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 12 0 12 4.418z"></path>
            </svg>
            Signing in...
          </span>
        </button>

        <p class="text-center text-gray-600 text-sm">
          New here?
          <a routerLink="/signup" class="text-crimson hover:text-crimson-light font-medium transition-colors ml-1">
            Create an account
          </a>
        </p>
      </form>
    </div>
  </div>
</div>

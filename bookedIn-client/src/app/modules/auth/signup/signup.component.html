<div class="auth-wrapper">
  <div class="auth-card wide-card">
    <h2 class="auth-title">Create Account</h2>
    
    <form (ngSubmit)="onSubmit()" class="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" name="fullName" [(ngModel)]="signupData.fullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="penName">Pen Name *</label>
          <input type="text" id="penName" name="penName" [(ngModel)]="signupData.penName" placeholder="Your display name" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="gender">Gender *</label>
          <select id="gender" name="gender" [(ngModel)]="signupData.gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="non-binary">Non-binary</option>
            <option value="prefer-not">Prefer not to say</option>
          </select>
        </div>
        <div class="form-group">
          <label for="country">Country *</label>
          <input type="text" id="country" name="country" [(ngModel)]="signupData.country" placeholder="Your country" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="language">Language *</label>
          <select id="language" name="language" [(ngModel)]="signupData.language" required>
            <option value="" disabled selected>Select language</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" [(ngModel)]="signupData.email" placeholder="your.email@example.com" required>
        </div>
      </div>

      <button type="submit" class="btn-submit">Sign Up</button>
    </form>
    
    <p class="auth-footer">
      Already have an account? <a routerLink="/login" class="highlight-link">Sign In</a>
    </p>
  </div>
</div>
